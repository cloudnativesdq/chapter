name: Auto-Triage New Talk Proposals

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, '[PROPUESTA]') || contains(github.event.issue.body, 'Tipo de Intervención')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto-assign, Label, and Milestone
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 1. Determine labels based on issue content
          LABELS=""

          # Detect Format/Category
          if echo "$ISSUE_BODY" | grep -qi "Workshop"; then
            LABELS="${LABELS}${LABELS:+,}type/workshop"
          fi
          if echo "$ISSUE_BODY" | grep -qi "Session"; then
            LABELS="${LABELS}${LABELS:+,}session"
          fi

          # Detect Modality
          if echo "$ISSUE_BODY" | grep -qi "Virtual"; then
            LABELS="${LABELS}${LABELS:+,}type/online"
          fi
          if echo "$ISSUE_BODY" | grep -qi "Onsite"; then
            LABELS="${LABELS}${LABELS:+,}type/in-person"
          fi

          # 2. Extract and Map Milestone
          # Get the selected value from the dropdown
          SELECTED_PERIOD=$(echo "$ISSUE_BODY" | grep -A 2 "Periodo Sugerido (Trimestre)" | tail -n 1 | xargs)

          case "$SELECTED_PERIOD" in
            *"Q1"*) MILESTONE_TITLE="2026 Q1" ;;
            *"Q2"*) MILESTONE_TITLE="2026 Q2" ;;
            *"Q3"*) MILESTONE_TITLE="2026 Q3" ;;
            *"Q4"*) MILESTONE_TITLE="2026 Q4" ;;
            *) MILESTONE_TITLE="2026 Q1" ;; # Fallback
          esac

          # 3. Apply changes via GitHub CLI
          # Split into multiple commands to ensure one failure doesn't block the others
          if [ -n "$LABELS" ]; then
            gh issue edit "$ISSUE_URL" --add-label "$LABELS" || echo "Warning: Failed to add labels"
          fi

          # Verify if milestone exists before assigning
          MILESTONE_NUMBER=$(gh api repos/:owner/:repo/milestones --jq ".[] | select(.title == \"$MILESTONE_TITLE\") | .number")
          if [ -n "$MILESTONE_NUMBER" ]; then
            gh issue edit "$ISSUE_URL" --milestone "$MILESTONE_TITLE" || echo "Warning: Failed to assign milestone"
          else
            echo "Warning: Milestone '$MILESTONE_TITLE' not found in repository."
          fi

          # Assign only TineoC as requested in the latest adjustment
          gh issue edit "$ISSUE_URL" --add-assignee "TineoC" || echo "Warning: Failed to assign TineoC"

          # 4. Add a welcoming comment
          gh issue comment "$ISSUE_URL" --body "¡Gracias por tu propuesta de charla! 🚀 

          Hemos realizado las siguientes acciones automáticas:
          - **Etiquetado:** Se han añadido etiquetas de categoría y modalidad.
          - **Milestone:** Asignado a **$MILESTONE_TITLE** (basado en la fecha de recepción).
          - **Asignación:** Los organizadores (@TineoC, @maddigsys) revisarán tu propuesta pronto.

          ¡Estamos ansiosos por saber más sobre tu charla!"
