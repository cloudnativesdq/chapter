name: Cloud Native SDQ - Talk Proposal Manager

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      bulk:
        description: "Run triage on all open proposals"
        required: false
        type: boolean
        default: false

permissions:
  issues: write
  contents: read

jobs:
  manage-proposal:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues' && (contains(github.event.issue.title, '[PROPUESTA]') || contains(github.event.issue.body, 'Tipo de Intervención'))) ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/')) ||
      (github.event_name == 'workflow_dispatch')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process Proposal
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          IS_BULK: ${{ github.event.inputs.bulk }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          triage_issue() {
            local issue_no=$1
            local command_type=$2
            local args=$3
            local summary=""
            
            echo "Processing Issue #$issue_no (Command: $command_type)..."
            
            local issue_data=$(gh issue view "$issue_no" --json url,body)
            local issue_body=$(echo "$issue_data" | jq -r '.body')

            if [[ "$command_type" == "all" || "$command_type" == "labels" ]]; then
              LABELS=""
              if echo "$issue_body" | grep -qi "Workshop"; then LABELS="${LABELS}${LABELS:+,}type/workshop"; fi
              if echo "$issue_body" | grep -qi "Session"; then LABELS="${LABELS}${LABELS:+,}session"; fi
              if echo "$issue_body" | grep -qi "Virtual"; then LABELS="${LABELS}${LABELS:+,}type/online"; fi
              if echo "$issue_body" | grep -qi "Onsite"; then LABELS="${LABELS}${LABELS:+,}type/in-person"; fi
              
              if [ -n "$LABELS" ]; then
                gh issue edit "$issue_no" --add-label "$LABELS" && \
                summary="$summary
- ✅ Etiquetas actualizadas: $LABELS" || \
                summary="$summary
- ❌ Error al actualizar etiquetas"
              fi
            fi

            if [[ "$command_type" == "all" || "$command_type" == "milestones" ]]; then
              SELECTED_PERIOD=$(echo "$issue_body" | grep -A 2 "Periodo Sugerido (Trimestre)" | tail -n 1 | xargs)
              case "$SELECTED_PERIOD" in
                *"Q1"*) MILESTONE_TITLE="2026 Q1" ;;
                *"Q2"*) MILESTONE_TITLE="2026 Q2" ;;
                *"Q3"*) MILESTONE_TITLE="2026 Q3" ;;
                *"Q4"*) MILESTONE_TITLE="2026 Q4" ;;
                *) MILESTONE_TITLE="2026 Q1" ;;
              esac
              
              MILESTONE_NUMBER=$(gh api repos/${REPO}/milestones --jq ".[] | select(.title == \"$MILESTONE_TITLE\") | .number")
              if [ -n "$MILESTONE_NUMBER" ]; then
                gh issue edit "$issue_no" --milestone "$MILESTONE_TITLE" && \
                summary="$summary
- ✅ Milestone asignado: $MILESTONE_TITLE" || \
                summary="$summary
- ❌ Error al asignar milestone"
              else
                summary="$summary
- ⚠️ No se encontró el milestone '$MILESTONE_TITLE'"
              fi
            fi

            if [[ "$command_type" == "all" ]]; then
              gh issue edit "$issue_no" --add-assignee "TineoC" && \
              summary="$summary
- ✅ Responsable asignado: @TineoC"
            elif [[ "$command_type" == "assign" ]]; then
              if [ -n "$args" ]; then
                CLEAN_ARGS=$(echo "$args" | tr -d '@' | xargs)
                gh issue edit "$issue_no" --add-assignee "$CLEAN_ARGS" && \
                summary="$summary
- ✅ Nueva asignación: $args" || \
                summary="$summary
- ❌ Error al asignar a: $args (Verifica que sea colaborador)"
              else
                summary="$summary
- ⚠️ Uso: /assign <username>"
              fi
            fi

            if [ "$IS_BULK" != "true" ] && [ -n "$summary" ]; then
              gh issue comment "$issue_no" --body "### 🤖 Actualización Automática
Hola @${ACTOR}, he procesado tu comando:
$summary"
            fi
          }

          if [[ "$IS_BULK" == "true" ]]; then
            ISSUES=$(gh issue list --state open --search "[PROPUESTA]" --json number --jq '.[].number')
            for num in $ISSUES; do
              triage_issue "$num" "all"
            done
          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            CMD=$(echo "$COMMENT_BODY" | awk '{print $1}')
            ARGS=$(echo "$COMMENT_BODY" | cut -d' ' -f2-)
            case "$CMD" in
              "/labels") triage_issue "$ISSUE_NUMBER" "labels" ;;
              "/milestones") triage_issue "$ISSUE_NUMBER" "milestones" ;;
              "/assign") triage_issue "$ISSUE_NUMBER" "assign" "$ARGS" ;;
              "/triage") triage_issue "$ISSUE_NUMBER" "all" ;;
            esac
          else
            triage_issue "$ISSUE_NUMBER" "all"
          fi
