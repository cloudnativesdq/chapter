name: Bulk Triage Existing Proposals
on:
    workflow_dispatch:

permissions:
    issues: write

jobs:
    bulk-triage:
        runs-on: ubuntu-latest
        steps:
            - name: Process existing open issues
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Fetch all open issues that might be proposals
                  # We search for issues with "[PROPUESTA]" in the title
                  ISSUES=$(gh issue list --state open --search "[PROPUESTA]" --json url,body --limit 100)

                  echo "Processing $(echo "$ISSUES" | jq '. | length') issues..."

                  echo "$ISSUES" | jq -c '.[]' | while read -r issue; do
                    ISSUE_URL=$(echo "$issue" | jq -r '.url')
                    ISSUE_BODY=$(echo "$issue" | jq -r '.body')
                    
                    echo "Processing $ISSUE_URL..."

                    # 1. Determine labels
                    LABELS=""
                    if echo "$ISSUE_BODY" | grep -qi "Workshop"; then
                      LABELS="${LABELS}${LABELS:+,}type/workshop"
                    fi
                    if echo "$ISSUE_BODY" | grep -qi "Session"; then
                      LABELS="${LABELS}${LABELS:+,}session"
                    fi
                    if echo "$ISSUE_BODY" | grep -qi "Virtual"; then
                      LABELS="${LABELS}${LABELS:+,}type/online"
                    fi
                    if echo "$ISSUE_BODY" | grep -qi "Onsite"; then
                      LABELS="${LABELS}${LABELS:+,}type/in-person"
                    fi

                    # 2. Calculate Milestone (standard logic)
                    MONTH=$(date +%-m)
                    YEAR=$(date +%Y)
                    if [ "$MONTH" -ge 11 ]; then
                      YEAR=$((YEAR + 1))
                      Q="Q1"
                    elif [ "$MONTH" -le 2 ]; then Q="Q1"
                    elif [ "$MONTH" -le 5 ]; then Q="Q2"
                    elif [ "$MONTH" -le 8 ]; then Q="Q3"
                    else Q="Q4"; fi
                    MILESTONE_TITLE="$YEAR $Q"

                    # 3. Apply changes (separate calls for safety)
                    if [ -n "$LABELS" ]; then
                      gh issue edit "$ISSUE_URL" --add-label "$LABELS" || echo "Warning: Failed labels on $ISSUE_URL"
                    fi
                    
                    gh issue edit "$ISSUE_URL" --milestone "$MILESTONE_TITLE" || echo "Warning: Failed milestone on $ISSUE_URL"
                    
                    gh issue edit "$ISSUE_URL" --add-assignee "TineoC,maddigsys" || \
                    gh issue edit "$ISSUE_URL" --add-assignee "TineoC" || \
                    echo "Warning: Failed assignments on $ISSUE_URL"
                    
                  done
